[project]
name = "etki-plugin-linear"
version = "0.1.0"
description = "Linear WorkItemProvider plugin for Etki (points-to-hours convention, zero-effort honesty)."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
dependencies = [
    "etki-api>=0.1,<0.2",
    "httpx>=0.27",
]

[project.entry-points."etki.adapters"]
linear = "etki_plugin_linear:PLUGIN"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/etki_plugin_linear"]

[tool.uv.sources]
etki-api = { workspace = true }
