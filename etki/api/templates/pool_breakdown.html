{% if items %}
<div style="margin-top:8px; padding:10px 12px; background:#FAF9F5; border:1px solid #EEEBE4; border-radius:9px;">
  {% for i in items %}
  <div style="display:flex; align-items:center; gap:10px; padding:3px 0; font-size:12.5px;">
    <span class="mono" style="color:var(--pmo-muted); flex:0 0 auto;">{{ i.id }}</span>
    <span style="flex:1 1 auto; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ i.title }}</span>
    <b class="mono" style="flex:0 0 auto;">{{ i.hours|round(1) }} {{ t('common.hours_short') }}</b>
  </div>
  {% endfor %}
  <div style="display:flex; justify-content:flex-end; border-top:1px solid #EEEBE4; margin-top:6px; padding-top:6px; font-size:12.5px;">
    <b class="mono">{{ total|round(1) }} {{ t('common.hours_short') }}</b>
  </div>
</div>
{% else %}
<p class="meta" style="margin:8px 0 0; font-size:12px;">{{ t('pool.no_items') }}</p>
{% endif %}
