<div style="border:1px solid #D7E0DA; border-radius:11px; background:#FAF9F5; overflow:hidden;">
  <div style="display:flex; align-items:center; gap:10px; padding:10px 14px; background:#F1EFE9; border-bottom:1px solid #E4E9E5;">
    <span style="width:24px; height:24px; border-radius:6px; background:#E6F4EC; color:#9A5F23; display:flex; align-items:center; justify-content:center; flex:0 0 24px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12 s3.5-7 10-7 10 7 10 7 -3.5 7-10 7 -10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></span>
    <div style="flex:1; min-width:0;">
      <div style="font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ name }}</div>
      <div class="mono" style="font-size:10.5px; color:var(--pmo-muted);">{{ t('dp.preview_source') }}: {{ source }}{% if truncated %} · {{ t('dp.first_chars', n='%0.0f'|format(text|length)) }}{% endif %}</div>
    </div>
    <button type="button" class="btn ghost" style="font-size:11.5px; padding:4px 10px;"
            onclick="document.getElementById('doc-preview').innerHTML=''">{{ t('common.close') }}</button>
  </div>
  <pre style="margin:0; padding:14px; max-height:420px; overflow:auto; font-size:12px; line-height:1.5; white-space:pre-wrap; word-break:break-word; color:#2B362F;">{{ text }}</pre>
  {% if truncated %}<div class="meta" style="padding:8px 14px; border-top:1px solid #E4E9E5; font-size:11.5px;">{{ t('dp.truncated') }}</div>{% endif %}
</div>
