{% extends "pmo_base.html" %}
{% block title %}{{ t('topbar.new_project') }} — Etki{% endblock %}
{% block screen %}
<main style="padding:26px 28px 40px; max-width:560px;">
  <a href="/" style="display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:600; color:#5C6B72; margin-bottom:16px;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6 l-6 6 6 6"/></svg>
    {{ t('common.back_to_projects') }}
  </a>
  <h1 style="margin:0; font-size:25px; font-weight:800; letter-spacing:-.02em;">{{ t('topbar.new_project') }}</h1>
  <p style="margin:6px 0 18px; font-size:14px; color:#5C6B72;">{{ t('yp.subtitle')|safe }}</p>

  <div style="background:#fff; border:1px solid #E6E2D9; border-radius:13px; padding:22px; box-shadow:0 1px 2px rgba(16,40,28,.03);">
    {% if error %}<div class="summary err" style="margin-top:0;">⚠ {{ error }}</div>{% endif %}
    <form method="post" action="/yeni-proje">
      <label style="display:block; font-size:13px; font-weight:600; color:#33424A; margin-bottom:6px;">{{ t('yp.id_label') }}</label>
      <input type="text" name="project_id" required placeholder="{{ t('yp.id_ph') }}" pattern="[A-Za-z0-9_-]+" style="width:100%; margin-bottom:16px;">

      <label style="display:block; font-size:13px; font-weight:600; color:#33424A; margin-bottom:6px;">{{ t('yp.name_label') }}</label>
      <input type="text" name="name" required placeholder="{{ t('yp.name_ph') }}" style="width:100%; margin-bottom:16px;">

      <label style="display:block; font-size:13px; font-weight:600; color:#33424A; margin-bottom:6px;">{{ t('yp.contract_label') }}</label>
      <input type="text" name="contract_id" value="CTR-NEW" style="width:100%; margin-bottom:20px;">

      <button class="btn" type="submit">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        {{ t('yp.create') }}
      </button>
    </form>
  </div>
</main>
{% endblock %}
